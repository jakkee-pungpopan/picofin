# NovaBank docker-compose - DEMO ONLY. Do not use for real financial transactions.
services:
  postgres:
    image: postgres:16-alpine
    container_name: novabank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novabank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novabank_pw}
      POSTGRES_DB: ${POSTGRES_DB:-novabank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novabank}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: novabank-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ./apps/backend-api
      dockerfile: Dockerfile
    container_name: novabank-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-novabank}:${POSTGRES_PASSWORD:-novabank_pw}@postgres:5432/${POSTGRES_DB:-novabank}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_dev_only}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_dev_only}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900s}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      API_PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    command: sh -c "npx prisma migrate deploy && npm run seed && node dist/main.js"

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    container_name: novabank-admin
    restart: unless-stopped
    depends_on:
      - backend-api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "${ADMIN_PORT:-3001}:3001"

volumes:
  pgdata:
