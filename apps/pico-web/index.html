<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PicoFin — ระบบสินเชื่อพิโกไฟแนนซ์</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
<style>@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
:root{--pri:#16557B;--pri2:#0E3A56;--acc:#1FA98F;--acc2:#27c7ad;--bg:#EEF2F7;--card:#fff;--mut:#6B7280;--txt:#16202A;--dng:#E5484D;--ok:#15a35b;--line:#e7edf3;--shadow:0 1px 3px rgba(16,40,60,.07),0 10px 28px rgba(16,40,60,.06)}
*{box-sizing:border-box}
body{margin:0;font-family:'Sarabun','Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:15px}
button{font-family:inherit;cursor:pointer}
.top{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 14px rgba(14,58,86,.25);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}
.brand .ti{font-size:24px}
.top .link,.top a,.top span,.top .ti-logout{color:#fff}
.top .ti-logout{cursor:pointer;opacity:.9;font-size:20px}.top .ti-logout:hover{opacity:1}
.banner{background:#fff7e6;color:#8a5b00;border-bottom:1px solid #ffe3a3;font-size:12.5px;text-align:center;padding:8px 12px}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0 10px}
.tabs button{border:1px solid var(--line);background:#fff;color:var(--mut);padding:9px 18px;border-radius:999px;font-size:14px;font-weight:600;transition:.15s;box-shadow:0 1px 2px rgba(16,40,60,.04)}
.tabs button:hover{border-color:var(--acc);color:var(--pri)}
.tabs button.on{background:var(--pri);color:#fff;border-color:var(--pri);box-shadow:0 6px 16px rgba(22,85,123,.3)}
.pad{padding:4px 0 44px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:6px 0 18px}
.cards .card{position:relative;overflow:hidden;padding:16px 18px}
.cards .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--acc),var(--acc2))}
.lbl{color:var(--mut);font-size:13px;margin-bottom:7px;font-weight:500}
.val{font-size:26px;font-weight:800;color:var(--pri);letter-spacing:-.5px;line-height:1.1}
h2{font-size:20px;font-weight:800;margin:8px 0 12px}h3{font-size:17px;font-weight:700;margin:0 0 8px}
.label{font-size:13px;color:var(--mut);margin:13px 0 5px;font-weight:600}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;background:#fff;color:var(--txt);transition:.15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(31,169,143,.16)}
input[type=file]{padding:9px;background:#f7fafc}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;border:0;padding:13px;border-radius:12px;font-size:15.5px;font-weight:700;box-shadow:0 6px 16px rgba(22,85,123,.26);transition:.15s;margin-top:6px}
.btn:hover{filter:brightness(1.07);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.act{background:var(--ok);color:#fff;border:0;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13.5px;transition:.15s}.act:hover{filter:brightness(1.08)}
.rej{background:#fff;color:var(--dng);border:1px solid var(--dng);padding:8px 16px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.15s;margin-left:6px}.rej:hover{background:var(--dng);color:#fff}
.ghost,.gh{background:#eef4f8;color:var(--pri);border:1px solid var(--line);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.15s}.ghost:hover,.gh:hover{background:#e2edf4}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-top:6px}
th{background:#f4f8fb;color:var(--mut);text-align:left;font-weight:700;padding:12px 14px;font-size:12.5px;border-bottom:1px solid var(--line)}
td{padding:12px 14px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
tbody tr{transition:.1s}tbody tr:hover{background:#f7fafc}
.pill{display:inline-block;padding:3px 11px;border-radius:999px;font-size:12px;font-weight:600;background:#eef2f6;color:var(--mut)}
.login{max-width:390px;margin:7vh auto;padding:0 16px}.login .card{padding:28px}.login h2{text-align:center}
.err{color:var(--dng);font-size:13px;margin-top:8px;text-align:center}
.muted{color:var(--mut)}.r{text-align:right}.center{text-align:center}
.box{background:#f7fafc;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
.modal{position:fixed;inset:0;background:rgba(16,30,45,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;overflow:auto;z-index:60;padding:18px}
.mbox{background:#fff;max-width:560px;width:100%;border-radius:18px;padding:22px;box-shadow:0 24px 64px rgba(0,0,0,.32);margin:20px 0}
.link{color:var(--acc);cursor:pointer;text-decoration:none;font-weight:600}
@media(max-width:560px){.wrap{padding:0 12px}.val{font-size:22px}.top{padding:12px 14px}.brand{font-size:17px}}</style></head>
<body><div id="root"></div>
<script>
var API=localStorage.getItem('pf_api')||'https://picofin-api.onrender.com',TOKEN=localStorage.getItem('pf_token')||'',ME=JSON.parse(localStorage.getItem('pf_me')||'null');
var root=document.getElementById('root');
function B(n){return '฿'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function tR(r){return ({OPERATOR:'ผู้ประกอบการ',STAFF:'พนักงาน',BORROWER:'ลูกค้า'})[r]||r;}
function tS(s){return ({PENDING:'รออนุมัติ',APPROVED:'อนุมัติแล้ว',REJECTED:'ปฏิเสธ',CANCELLED:'ยกเลิก',ACTIVE:'กำลังผ่อน',CLOSED:'ปิดสัญญา',DEFAULTED:'ผิดนัด',DUE:'รอชำระ',PAID:'ชำระแล้ว',OVERDUE:'เกินกำหนด',PARTIAL:'ชำระบางส่วน'})[s]||s;}
function esc(s){return (''+s).replace(/"/g,'&quot;');}
async function api(path,method,body){
  const r=await fetch(((API&&!/github\.io/.test(API))?API:'https://picofin-api.onrender.com').replace(/\/$/,'')+'/api'+path,{method:method||'GET',
    headers:Object.assign({'Content-Type':'application/json'},TOKEN?{Authorization:'Bearer '+TOKEN}:{}),
    body:body?JSON.stringify(body):undefined});
  const d=await r.json().catch(()=>null);
  if(!r.ok) throw new Error((d&&(d.error||d.message))||('HTTP '+r.status)); return d;
}
function setupScreen(msg){root.innerHTML='<div class="login"><h3>PicoFin — ตั้งค่าเซิร์ฟเวอร์</h3>'+
  '<div class="label">วางลิงก์ API ที่ deploy แล้ว เช่น https://picofin-api.onrender.com</div>'+
  (msg?'<div class="err">'+msg+'</div>':'')+
  '<input id="u" placeholder="https://picofin-api.onrender.com" value="'+esc(API)+'">'+
  '<button class="btn" onclick="(function(){var v=document.getElementById(\'u\').value.trim();if(v){API=v;localStorage.setItem(\'pf_api\',v);loginScreen();}})()">บันทึก</button></div>';}

function loginScreen(){setTimeout(function(){try{var s=localStorage.getItem('pf_rm');if(s){var o=JSON.parse(s);var e=document.getElementById('e'),pp=document.getElementById('p'),c=document.getElementById('rmb');if(e&&o.e)e.value=o.e;if(pp&&o.p)pp.value=o.p;if(c)c.checked=true;}}catch(_x){}},60);root.innerHTML='<div class="login" style="text-align:center;">'+
  '<div style="font-size:40px;color:var(--pri);"><i class="ti ti-building-bank"></i></div>'+
  '<h3>PicoFin</h3><div class="label" style="margin-bottom:14px;">ระบบจัดการสินเชื่อพิโกไฟแนนซ์</div>'+
  '<div style="text-align:left;"><div class="label">อีเมล</div><input id="e" value="owner@picofin.local">'+
  '<div class="label">รหัสผ่าน</div><div style="position:relative"><input id="p" type="password" value="Password@123" style="padding-right:46px"><button type="button" onclick="togglePw(this)" style="position:absolute;right:8px;top:8px;background:none;border:0;cursor:pointer;font-size:18px;line-height:1">👁</button></div>'+
  '<div class="err" id="er"></div></div>'+
  '<label style="display:flex;align-items:center;gap:8px;margin:8px 0 4px;font-size:14px;cursor:pointer;color:#334"><input type="checkbox" id="rmb" style="width:auto;margin:0"> จดจำรหัสผ่าน</label><button class="btn" onclick="doLogin()">เข้าสู่ระบบ</button>'+
  '<div style="margin-top:12px;"><a class="link" onclick="registerScreen()">ลงทะเบียนเป็นลูกค้า (ผู้กู้)</a></div>'+
  '<div style="margin-top:8px;"><a class="link" onclick="setupScreen()">เปลี่ยนเซิร์ฟเวอร์</a></div>'+
  '<div class="label" style="margin-top:14px;">: owner@ / staff@ / somchai@picofin.local (รหัส Password@123)</div></div>';}
function togglePw(b){var el=b.parentNode.querySelector('input');if(!el)return;if(el.type==='pass'+'word'){el.type='text';b.textContent='🙈';}else{el.type='pass'+'word';b.textContent='👁';}}
async function doLogin(){try{var _r=document.getElementById('rmb');if(_r){if(_r.checked){localStorage.setItem('pf_rm',JSON.stringify({e:document.getElementById('e').value,p:document.getElementById('p').value}));}else{localStorage.removeItem('pf_rm');}}}catch(_y){}try{const r=await api('/auth/login','POST',{email:document.getElementById('e').value.trim(),password:document.getElementById('p').value});
  TOKEN=r.accessToken;ME=r.user;localStorage.setItem('pf_token',TOKEN);localStorage.setItem('pf_me',JSON.stringify(ME));route();}
  catch(e){document.getElementById('er').textContent=e.message;}}
function logout(){TOKEN='';ME=null;localStorage.removeItem('pf_token');localStorage.removeItem('pf_me');loginScreen();}

function registerScreen(){setTimeout(function(){if(typeof thLoad==='function')thLoad();},60);root.innerHTML='<div class="login"><h3>ลงทะเบียนลูกค้า (ผู้กู้)</h3>'+
  '<div class="label">ชื่อ *</div><input id="fn"><div class="label">นามสกุล *</div><input id="ln">'+
  '<div class="label">อีเมล</div><input id="e">'+
  '<div class="label">รหัสผ่าน (อย่างน้อย 8 ตัว)</div><div style="position:relative"><input id="p" type="password" style="padding-right:46px"><button type="button" onclick="togglePw(this)" style="position:absolute;right:8px;top:8px;background:none;border:0;cursor:pointer;font-size:18px;line-height:1">👁</button></div>'+
  '<div class="label">เลขบัตรประชาชน (13 หลัก) *</div><input id="nid" value="1100700999999">'+
  '<div class="label">จังหวัด *</div><select id="pv" onchange="onProv()"><option value="">— เลือกจังหวัด —</option></select><div class="label">อำเภอ/เขต *</div><select id="amp" onchange="onAmp()"><option value="">—</option></select><div class="label">ตำบล/แขวง *</div><select id="tam" onchange="onTam()"><option value="">—</option></select><div class="label">รหัสไปรษณีย์</div><input id="zip" readonly placeholder="อัตโนมัติ"><div class="label">เบอร์โทรศัพท์ *</div><input id="ph" value="" placeholder="08xxxxxxxx"><div class="label">บ้านเลขที่ / หมู่ / ซอย / ถนน *</div><input id="ad" value="" placeholder="เช่น 99/1 หมู่ 2 ถ.จิระ">'+
  '<div class="err" id="er"></div><button class="btn" onclick="doReg()">สร้างบัญชี</button>'+
  '<div style="margin-top:10px;"><a class="link" onclick="loginScreen()">กลับไปเข้าสู่ระบบ</a></div></div>';}
async function doReg(){try{var _v=function(id){var el=document.getElementById(id);return el&&el.value?el.value.trim():'';};var _er=document.getElementById('er');if(!_v('fn')||!_v('ln')||!_v('nid')||!_v('ph')||!_v('pv')||!_v('amp')||!_v('tam')||!_v('ad')){if(_er)_er.textContent='กรุณากรอกข้อมูลให้ครบ (ชื่อ, นามสกุล, เลขบัตร, เบอร์โทร, จังหวัด/อำเภอ/ตำบล, ที่อยู่)';return;}if(!/^[0-9]{13}$/.test(_v('nid'))){if(_er)_er.textContent='เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก';return;}if(_v('ph').replace(/[^0-9]/g,'').length<9){if(_er)_er.textContent='เบอร์โทรศัพท์ไม่ถูกต้อง';return;}const r=await api('/auth/register','POST',{fullName:(_v('fn')+' '+_v('ln')).trim(),email:document.getElementById('e').value.trim(),password:document.getElementById('p').value,nationalId:document.getElementById('nid').value.trim(),province:_v('pv'),phone:document.getElementById('ph').value.trim(),address:(_v('ad')+' ต.'+_v('tam')+' อ.'+_v('amp')+' จ.'+_v('pv')+' '+(_v('zip')||'')).trim()});
  TOKEN=r.accessToken;ME=r.user;localStorage.setItem('pf_token',TOKEN);localStorage.setItem('pf_me',JSON.stringify(ME));route();}
  catch(e){document.getElementById('er').textContent=e.message;}}

function route(){ if(!API)return setupScreen(); if(!TOKEN||!ME)return loginScreen();
  (ME.role==='BORROWER')?customer('apply'):operator('dash'); }

/* ================= OPERATOR ================= */
function shellOp(active,body){
  var tabs=[['dash','แดชบอร์ด'],['apps','คำขอกู้'],['loans','สัญญากู้'],['borrowers','ลูกค้า']];
  root.innerHTML='<div class="top"><div class="brand"><i class="ti ti-building-bank"></i> PicoFin</div>'+
    '<div><span style="font-size:13px;margin-right:12px;">'+ME.fullName+' ('+tR(ME.role)+')</span><i class="ti ti-logout" style="cursor:pointer;" onclick="logout()"></i></div></div>'+
    '<div class="banner">ระบบสินเชื่อพิโกไฟแนนซ์ — ปล่อยกู้จากทุนตัวเอง ไม่รับฝากเงินประชาชน</div>'+
    '<div class="tabs">'+tabs.map(t=>'<button class="'+(active===t[0]?'on':'')+'" onclick="operator(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div>'+
    '<div class="wrap"><div class="pad" id="body">กำลังโหลด...</div></div>';
}
async function operator(tab){shellOp(tab,'');var body=document.getElementById('body');try{
  if(tab==='dash'){const d=await api('/dashboard');
    body.innerHTML='<div class="cards">'+
      card('ทุนคงเหลือ',B(d.operator?d.operator.capital:0))+card('ลูกค้า',d.borrowers)+
      card('สัญญาที่ใช้งาน',d.activeLoans)+card('คำขอรออนุมัติ',d.pendingApplications)+
      card('ยอดปล่อยกู้รวม',B(d.totalDisbursed))+card('ยอดค้างชำระ',B(d.outstanding))+'</div>'+
      '<div class="card"><b>ผู้ประกอบการ:</b> '+(d.operator?d.operator.name+' • '+d.operator.picoType+' • จ.'+d.operator.province:'-')+'</div>';
  } else if(tab==='apps'){const a=await api('/applications?status=PENDING');
    body.innerHTML='<h3>คำขอกู้ที่รออนุมัติ</h3>'+(a.length?tableApps(a):'<div class="card">ไม่มีคำขอรออนุมัติ</div>');
  } else if(tab==='loans'){const l=await api('/loans');
    body.innerHTML='<h3>สัญญากู้</h3>'+(l.length?tableLoans(l):'<div class="card">ยังไม่มีสัญญา</div>');
  } else if(tab==='borrowers'){const b=await api('/borrowers');
    body.innerHTML='<h3>ลูกค้า</h3><button class="ghost" onclick="showAddCust()" style="margin-bottom:10px">+ เพิ่มลูกค้าใหม่</button><div id="addcust" style="display:none"><div class="card" style="margin:10px 0"><div class="label">ชื่อ *</div><input id="fn"><div class="label">นามสกุล *</div><input id="ln"><div class="label">เลขบัตรประชาชน (13 หลัก) *</div><input id="nid"><div class="label">จังหวัด *</div><select id="pv" onchange="onProv()"><option value="">— เลือกจังหวัด —</option></select><div class="label">อำเภอ/เขต *</div><select id="amp" onchange="onAmp()"><option value="">—</option></select><div class="label">ตำบล/แขวง *</div><select id="tam" onchange="onTam()"><option value="">—</option></select><div class="label">รหัสไปรษณีย์</div><input id="zip" readonly><div class="label">บ้านเลขที่/หมู่/ซอย/ถนน *</div><input id="ad"><div class="label">เบอร์โทรศัพท์ *</div><input id="ph"><div class="err" id="acerr"></div><button class="btn" onclick="addBorrower()">บันทึกลูกค้า</button></div></div><table><tr><th>ชื่อ</th><th>บัตร ปชช.</th><th>จังหวัด</th><th>สัญญา</th></tr>'+
      b.map(x=>'<tr><td>'+x.fullName+'</td><td>'+x.nationalId+'</td><td>'+x.province+'</td><td>'+(x._count?x._count.loans:0)+'</td></tr>').join('')+'</table>';
  }}catch(e){body.innerHTML='<div class="err">'+e.message+'</div>';}}
function card(l,v){return '<div class="card"><div class="lbl">'+l+'</div><div class="val">'+v+'</div></div>';}
function tableApps(a){return '<table><tr><th>ลูกค้า</th><th>จังหวัด</th><th>วงเงิน</th><th>ดอกเบี้ย</th><th>งวด</th><th>วัตถุประสงค์</th><th></th></tr>'+
  a.map(x=>'<tr><td>'+x.borrower.fullName+'</td><td>'+x.borrower.province+'</td><td>'+B(x.amount)+'</td><td>'+x.annualRatePct+'%</td><td>'+x.termMonths+'</td><td>'+(x.purpose||'-')+'</td>'+
  '<td><button class="ghost" onclick="viewDoc(\''+x.id+'\')">ดูเอกสาร</button><button class="act" onclick="approve(\''+x.id+'\')">อนุมัติ</button> <button class="rej" onclick="reject(\''+x.id+'\')">ปฏิเสธ</button></td></tr>').join('')+'</table>';}
function tableLoans(l){return '<table><tr><th>เลขสัญญา</th><th>ลูกค้า</th><th>เงินต้น</th><th>ดอกเบี้ย</th><th>งวด</th><th>สถานะ</th><th></th></tr>'+
  l.map(x=>'<tr><td>'+x.contractNo+'</td><td>'+(x.borrower?x.borrower.fullName:'')+'</td><td>'+B(x.principal)+'</td><td>'+x.annualRatePct+'%</td><td>'+x.termMonths+'</td><td><span class="pill" style="background:'+(x.status==='CLOSED'?'#dff3ee':'#e7eef5')+';">'+tS(x.status)+'</span></td>'+
  '<td><button class="gh" onclick="openLoan(\''+x.id+'\')">ดูตารางผ่อน</button></td></tr>').join('')+'</table>';}
async function approve(id){try{await api('/loans/applications/'+id+'/approve','POST',{});operator('apps');}catch(e){alert(e.message);}}
async function reject(id){var r=prompt('เหตุผลที่ปฏิเสธ:');if(r===null)return;try{await api('/loans/applications/'+id+'/reject','POST',{reason:r||'-'});operator('apps');}catch(e){alert(e.message);}}
async function openLoan(id){try{const l=await api('/loans/'+id);
  var rows=l.installments.map(i=>'<tr><td>'+i.no+'</td><td>'+new Date(i.dueDate).toLocaleDateString('th-TH')+'</td><td>'+B(i.principal)+'</td><td>'+B(i.interest)+'</td><td>'+B(i.total)+'</td><td><span class="pill" style="background:'+(i.status==='PAID'?'#dff3ee':'#f7f1d8')+';">'+((new Date(i.dueDate)<new Date()&&i.status!=='PAID'&&i.status!=='CLOSED')?'<span style="color:#c0392b;font-weight:700">เกินกำหนด</span>':tS(i.status))+'</span></td></tr>').join('');
  var m=document.createElement('div');m.className='modal';m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="mbox"><h3>สัญญา '+l.contractNo+'</h3>'+
    '<div class="label">เงินต้น '+B(l.principal)+' • ดอกเบี้ย '+l.annualRatePct+'%/ปี • '+l.termMonths+' งวด • รวมชำระ '+(l.summary?B(l.summary.total):'-')+'</div>'+
