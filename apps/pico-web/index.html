<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PicoFin — ระบบสินเชื่อพิโกไฟแนนซ์</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.21.0/tabler-icons.min.css">
<style>
 :root{--pri:#16557B;--pri2:#0E3A56;--acc:#1FA98F;--bg:#F3F6F9;--mut:#6B7280;--txt:#16202A;--dng:#E5484D;}
 *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI','Sarabun',Tahoma,sans-serif;}
 body{background:var(--bg);color:var(--txt);}
 .wrap{max-width:1000px;margin:0 auto;padding:0 0 40px;}
 .top{background:var(--pri);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
 .top .ti{font-size:20px;} .brand{font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px;}
 .banner{background:#FFF3CD;color:#7A5C00;font-size:12px;text-align:center;padding:6px;}
 .tabs{display:flex;gap:4px;background:#fff;padding:8px 16px;border-bottom:1px solid #e6ebf0;flex-wrap:wrap;}
 .tabs button{background:none;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--mut);}
 .tabs button.on{background:var(--pri);color:#fff;}
 .pad{padding:18px;}
 .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
 .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
 .card .lbl{color:var(--mut);font-size:13px;} .card .val{font-size:24px;font-weight:700;color:var(--pri);margin-top:4px;}
 table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:14px;}
 th,td{text-align:left;padding:10px 12px;border-bottom:1px solid #eef2f5;}
 th{background:#f7f9fb;color:var(--mut);font-weight:600;}
 button.act{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;}
 button.rej{background:#fff;color:var(--dng);border:1px solid #f0c0c0;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;}
 button.gh{background:#fff;color:var(--pri);border:1px solid #cdd9e3;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;}
 input,select{padding:11px;border:1px solid #d6dee6;border-radius:9px;font-size:15px;width:100%;margin:5px 0 12px;}
 .label{font-size:13px;color:var(--mut);} .btn{background:var(--pri);color:#fff;border:none;border-radius:10px;padding:13px;width:100%;font-size:16px;font-weight:600;cursor:pointer;}
 .err{color:var(--dng);font-size:13px;min-height:18px;} .ok{color:var(--acc);font-size:13px;}
 .login{max-width:400px;margin:50px auto;background:#fff;border-radius:16px;padding:26px;box-shadow:0 6px 24px rgba(0,0,0,.08);}
 .pill{font-size:11px;padding:2px 9px;border-radius:20px;}
 .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:9;}
 .mbox{background:#fff;border-radius:14px;padding:20px;max-width:520px;width:100%;max-height:86vh;overflow:auto;}
 h3{margin:6px 0 12px;}
 a.link{color:var(--pri);cursor:pointer;font-size:14px;}
</style></head>
<body><div id="root"></div>
<script>
var API=localStorage.getItem('pf_api')||'',TOKEN=localStorage.getItem('pf_token')||'',ME=JSON.parse(localStorage.getItem('pf_me')||'null');
var root=document.getElementById('root');
function B(n){return '฿'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function tR(r){return ({OPERATOR:'ผู้ประกอบการ',STAFF:'พนักงาน',BORROWER:'ลูกค้า'})[r]||r;}
function tS(s){return ({PENDING:'รออนุมัติ',APPROVED:'อนุมัติแล้ว',REJECTED:'ปฏิเสธ',CANCELLED:'ยกเลิก',ACTIVE:'กำลังผ่อน',CLOSED:'ปิดสัญญา',DEFAULTED:'ผิดนัด',DUE:'รอชำระ',PAID:'ชำระแล้ว',OVERDUE:'เกินกำหนด',PARTIAL:'ชำระบางส่วน'})[s]||s;}
function esc(s){return (''+s).replace(/"/g,'&quot;');}
async function api(path,method,body){
  const r=await fetch(API.replace(/\/$/,'')+'/api'+path,{method:method||'GET',
    headers:Object.assign({'Content-Type':'application/json'},TOKEN?{Authorization:'Bearer '+TOKEN}:{}),
    body:body?JSON.stringify(body):undefined});
  const d=await r.json().catch(()=>null);
  if(!r.ok) throw new Error((d&&(d.error||d.message))||('HTTP '+r.status)); return d;
}
function setupScreen(msg){root.innerHTML='<div class="login"><h3>PicoFin — ตั้งค่าเซิร์ฟเวอร์</h3>'+
  '<div class="label">วางลิงก์ API ที่ deploy แล้ว เช่น https://picofin-api.onrender.com</div>'+
  (msg?'<div class="err">'+msg+'</div>':'')+
  '<input id="u" placeholder="https://picofin-api.onrender.com" value="'+esc(API)+'">'+
  '<button class="btn" onclick="(function(){var v=document.getElementById(\'u\').value.trim();if(v){API=v;localStorage.setItem(\'pf_api\',v);loginScreen();}})()">บันทึก</button></div>';}

function loginScreen(){root.innerHTML='<div class="login" style="text-align:center;">'+
  '<div style="font-size:40px;color:var(--pri);"><i class="ti ti-building-bank"></i></div>'+
  '<h3>PicoFin</h3><div class="label" style="margin-bottom:14px;">ระบบจัดการสินเชื่อพิโกไฟแนนซ์</div>'+
  '<div style="text-align:left;"><div class="label">อีเมล</div><input id="e" value="owner@picofin.local">'+
  '<div class="label">รหัสผ่าน</div><input id="p" type="password" value="Password@123">'+
  '<div class="err" id="er"></div></div>'+
  '<button class="btn" onclick="doLogin()">เข้าสู่ระบบ</button>'+
  '<div style="margin-top:12px;"><a class="link" onclick="registerScreen()">ลงทะเบียนเป็นลูกค้า (ผู้กู้)</a></div>'+
  '<div style="margin-top:8px;"><a class="link" onclick="setupScreen()">เปลี่ยนเซิร์ฟเวอร์</a></div>'+
  '<div class="label" style="margin-top:14px;">: owner@ / staff@ / somchai@picofin.local (รหัส Password@123)</div></div>';}
async function doLogin(){try{const r=await api('/auth/login','POST',{email:document.getElementById('e').value.trim(),password:document.getElementById('p').value});
  TOKEN=r.accessToken;ME=r.user;localStorage.setItem('pf_token',TOKEN);localStorage.setItem('pf_me',JSON.stringify(ME));route();}
  catch(e){document.getElementById('er').textContent=e.message;}}
function logout(){TOKEN='';ME=null;localStorage.removeItem('pf_token');localStorage.removeItem('pf_me');loginScreen();}

function registerScreen(){root.innerHTML='<div class="login"><h3>ลงทะเบียนลูกค้า (ผู้กู้)</h3>'+
  '<div class="label">ชื่อ-นามสกุล</div><input id="n">'+
  '<div class="label">อีเมล</div><input id="e">'+
  '<div class="label">รหัสผ่าน (อย่างน้อย 8 ตัว)</div><input id="p" type="password">'+
  '<div class="label">เลขบัตรประชาชน</div><input id="nid" value="1100700999999">'+
  '<div class="label">จังหวัด (ภูมิลำเนา)</div><input id="pv" value="บุรีรัมย์">'+
  '<div class="err" id="er"></div><button class="btn" onclick="doReg()">สร้างบัญชี</button>'+
  '<div style="margin-top:10px;"><a class="link" onclick="loginScreen()">กลับไปเข้าสู่ระบบ</a></div></div>';}
async function doReg(){try{const r=await api('/auth/register','POST',{fullName:document.getElementById('n').value.trim(),email:document.getElementById('e').value.trim(),password:document.getElementById('p').value,nationalId:document.getElementById('nid').value.trim(),province:document.getElementById('pv').value.trim()});
  TOKEN=r.accessToken;ME=r.user;localStorage.setItem('pf_token',TOKEN);localStorage.setItem('pf_me',JSON.stringify(ME));route();}
  catch(e){document.getElementById('er').textContent=e.message;}}

function route(){ if(!API)return setupScreen(); if(!TOKEN||!ME)return loginScreen();
  (ME.role==='BORROWER')?customer('apply'):operator('dash'); }

/* ================= OPERATOR ================= */
function shellOp(active,body){
  var tabs=[['dash','แดชบอร์ด'],['apps','คำขอกู้'],['loans','สัญญากู้'],['borrowers','ลูกค้า']];
  root.innerHTML='<div class="top"><div class="brand"><i class="ti ti-building-bank"></i> PicoFin</div>'+
    '<div><span style="font-size:13px;margin-right:12px;">'+ME.fullName+' ('+tR(ME.role)+')</span><i class="ti ti-logout" style="cursor:pointer;" onclick="logout()"></i></div></div>'+
    '<div class="banner">ระบบสินเชื่อพิโกไฟแนนซ์ — ปล่อยกู้จากทุนตัวเอง ไม่รับฝากเงินประชาชน</div>'+
    '<div class="tabs">'+tabs.map(t=>'<button class="'+(active===t[0]?'on':'')+'" onclick="operator(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div>'+
    '<div class="wrap"><div class="pad" id="body">กำลังโหลด...</div></div>';
}
async function operator(tab){shellOp(tab,'');var body=document.getElementById('body');try{
  if(tab==='dash'){const d=await api('/dashboard');
    body.innerHTML='<div class="cards">'+
      card('ทุนคงเหลือ',B(d.operator?d.operator.capital:0))+card('ลูกค้า',d.borrowers)+
      card('สัญญาที่ใช้งาน',d.activeLoans)+card('คำขอรออนุมัติ',d.pendingApplications)+
      card('ยอดปล่อยกู้รวม',B(d.totalDisbursed))+card('ยอดค้างชำระ',B(d.outstanding))+'</div>'+
      '<div class="card"><b>ผู้ประกอบการ:</b> '+(d.operator?d.operator.name+' • '+d.operator.picoType+' • จ.'+d.operator.province:'-')+'</div>';
  } else if(tab==='apps'){const a=await api('/applications?status=PENDING');
    body.innerHTML='<h3>คำขอกู้ที่รออนุมัติ</h3>'+(a.length?tableApps(a):'<div class="card">ไม่มีคำขอรออนุมัติ</div>');
  } else if(tab==='loans'){const l=await api('/loans');
    body.innerHTML='<h3>สัญญากู้</h3>'+(l.length?tableLoans(l):'<div class="card">ยังไม่มีสัญญา</div>');
  } else if(tab==='borrowers'){const b=await api('/borrowers');
    body.innerHTML='<h3>ลูกค้า</h3><table><tr><th>ชื่อ</th><th>บัตร ปชช.</th><th>จังหวัด</th><th>สัญญา</th></tr>'+
      b.map(x=>'<tr><td>'+x.fullName+'</td><td>'+x.nationalId+'</td><td>'+x.province+'</td><td>'+(x._count?x._count.loans:0)+'</td></tr>').join('')+'</table>';
  }}catch(e){body.innerHTML='<div class="err">'+e.message+'</div>';}}
function card(l,v){return '<div class="card"><div class="lbl">'+l+'</div><div class="val">'+v+'</div></div>';}
function tableApps(a){return '<table><tr><th>ลูกค้า</th><th>จังหวัด</th><th>วงเงิน</th><th>ดอกเบี้ย</th><th>งวด</th><th>วัตถุประสงค์</th><th></th></tr>'+
  a.map(x=>'<tr><td>'+x.borrower.fullName+'</td><td>'+x.borrower.province+'</td><td>'+B(x.amount)+'</td><td>'+x.annualRatePct+'%</td><td>'+x.termMonths+'</td><td>'+(x.purpose||'-')+'</td>'+
  '<td><button class="ghost" onclick="viewDoc(\''+x.id+'\')">ดูเอกสาร</button><button class="act" onclick="approve(\''+x.id+'\')">อนุมัติ</button> <button class="rej" onclick="reject(\''+x.id+'\')">ปฏิเสธ</button></td></tr>').join('')+'</table>';}
function tableLoans(l){return '<table><tr><th>เลขสัญญา</th><th>ลูกค้า</th><th>เงินต้น</th><th>ดอกเบี้ย</th><th>งวด</th><th>สถานะ</th><th></th></tr>'+
  l.map(x=>'<tr><td>'+x.contractNo+'</td><td>'+(x.borrower?x.borrower.fullName:'')+'</td><td>'+B(x.principal)+'</td><td>'+x.annualRatePct+'%</td><td>'+x.termMonths+'</td><td><span class="pill" style="background:'+(x.status==='CLOSED'?'#dff3ee':'#e7eef5')+';">'+tS(x.status)+'</span></td>'+
  '<td><button class="gh" onclick="openLoan(\''+x.id+'\')">ดูตารางผ่อน</button></td></tr>').join('')+'</table>';}
async function approve(id){try{await api('/loans/applications/'+id+'/approve','POST',{});operator('apps');}catch(e){alert(e.message);}}
async function reject(id){var r=prompt('เหตุผลที่ปฏิเสธ:');if(r===null)return;try{await api('/loans/applications/'+id+'/reject','POST',{reason:r||'-'});operator('apps');}catch(e){alert(e.message);}}
async function openLoan(id){try{const l=await api('/loans/'+id);
  var rows=l.installments.map(i=>'<tr><td>'+i.no+'</td><td>'+new Date(i.dueDate).toLocaleDateString('th-TH')+'</td><td>'+B(i.principal)+'</td><td>'+B(i.interest)+'</td><td>'+B(i.total)+'</td><td><span class="pill" style="background:'+(i.status==='PAID'?'#dff3ee':'#f7f1d8')+';">'+tS(i.status)+'</span></td></tr>').join('');
  var m=document.createElement('div');m.className='modal';m.onclick=function(e){if(e.target===m)m.remove();};
  m.innerHTML='<div class="mbox"><h3>สัญญา '+l.contractNo+'</h3>'+
    '<div class="label">เงินต้น '+B(l.principal)+' • ดอกเบี้ย '+l.annualRatePct+'%/ปี • '+l.termMonths+' งวด • รวมชำระ '+(l.summary?B(l.summary.total):'-')+'</div>'+
    '<div class="label" style="color:#16557B;font-weight:600">ชำระแล้ว '+B((l.installments||[]).reduce(function(s,i){return s+(i.paidAmount||0);},0))+' ('+(l.installments||[]).filter(function(i){return i.status==='PAID';}).length+'/'+l.termMonths+' งวด) • คงเหลือ '+B((l.summary?l.summary.total:0)-(l.installments||[]).reduce(function(s,i){return s+(i.paidAmount||0);},0))+'</div>'+
    '<div class="label">งวดถัดไป: '+(function(){var n=(l.installments||[]).find(function(i){return i.status!=='PAID';});return n?('งวด '+n.no+' ครบกำหนด '+new Date(n.dueDate).toLocaleDateString('th-TH')+' • '+B(n.total-(n.paidAmount||0))):'ชำระครบทุกงวดแล้ว';})()+'</div>'+
    '<button class="ghost" style="margin-top:8px;margin-bottom:4px" onclick="printLoan(\''+l.id+'\')">🖨️ พิมพ์สัญญา/ตารางผ่อน</button>'+
    '<button class="ghost" style="margin:4px 0 8px" onclick="loanContract(\''+l.id+'\')">📄 สัญญากู้ (สำหรับเซ็น)</button>'+
    '<div style="margin:10px 0;"><div class="label">บันทึกรับชำระ (บาท)</div><input id="payamt" type="number" placeholder="เช่น 1066.19">'+
    '<button class="btn" style="margin-top:4px;" onclick="pay(\''+l.id+'\')">รับชำระ + ตัดงวด</button><div class="err" id="payerr"></div></div>'+
    '<table><tr><th>งวด</th><th>ครบกำหนด</th><th>เงินต้น</th><th>ดอกเบี้ย</th><th>รวม</th><th>สถานะ</th></tr>'+rows+'</table></div>';
  document.body.appendChild(m);}catch(e){alert(e.message);}}
async function pay(id){var v=parseFloat(document.getElementById('payamt').value);if(!v){document.getElementById('payerr').textContent='ใส่จำนวนเงิน';return;}
  try{const r=await api('/loans/'+id+'/payments','POST',{amount:v});document.querySelector('.modal').remove();openLoan(id);if(r.loanClosed)setTimeout(()=>alert('ชำระครบ ปิดสัญญาแล้ว'),200);}catch(e){document.getElementById('payerr').textContent=e.message;}}

/* ================= CUSTOMER ================= */
function shellCu(active,body){
  var tabs=[['apply','ขอสินเชื่อ'],['myapps','คำขอของฉัน'],['myloans','สัญญาของฉัน']];
  root.innerHTML='<div class="top"><div class="brand"><i class="ti ti-user"></i> PicoFin</div>'+
    '<div><span style="font-size:13px;margin-right:12px;">'+ME.fullName+'</span><i class="ti ti-logout" style="cursor:pointer;" onclick="logout()"></i></div></div>'+
    '<div class="banner">ระบบสินเชื่อพิโกไฟแนนซ์ — สินเชื่อพิโกไฟแนนซ์</div>'+
    '<div class="tabs">'+tabs.map(t=>'<button class="'+(active===t[0]?'on':'')+'" onclick="customer(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div>'+
    '<div class="wrap"><div class="pad" id="body">กำลังโหลด...</div></div>';
}
async function customer(tab){shellCu(tab,'');var body=document.getElementById('body');try{
  if(tab==='apply'){body.innerHTML='<div class="card" style="max-width:460px;"><h3>ยื่นขอสินเชื่อ</h3>'+
    '<div class="label">วงเงิน (บาท) — สูงสุด 50,000</div><input id="amt" type="number" value="20000">'+
    '<div class="label">ดอกเบี้ยต่อปี (%) — สูงสุด 36</div><input id="rate" type="number" value="24">'+
    '<div class="label">จำนวนงวด (เดือน)</div><input id="term" type="number" value="12">'+
    '<div class="label">วัตถุประสงค์</div><input id="pp" value="เงินทุนหมุนเวียน">'+
    '<div class="err" id="er"></div><div class="label">อาชีพ</div><input id="occ" value=""><div class="label">รายได้ต่อเดือน (บาท)</div><input id="inc" type="number" value=""><div class="label">บัตรประชาชนด้านหน้า (ถ่ายรูป)</div><input id="idf" type="file" accept="image/*" capture="environment"><div class="label">บัตรประชาชนด้านหลัง (ถ่ายรูป)</div><input id="idb" type="file" accept="image/*" capture="environment"><div class="label">รูปถ่ายคู่บัตรประชาชน (เซลฟี่)</div><input id="self" type="file" accept="image/*" capture="user"><div class="label">สลิปเงินเดือน (ถ่ายรูป)</div><input id="slip" type="file" accept="image/*" capture="environment"><div class="label">ชื่อผู้ค้ำประกัน</div><input id="gname" value=""><div class="label">เบอร์โทรผู้ค้ำประกัน</div><input id="gphone" value=""><div class="label">บัตรประชาชนผู้ค้ำประกัน (ถ่ายรูป)</div><input id="gid" type="file" accept="image/*" capture="environment"><div class="label">ประเภทหลักประกัน</div><select id="coltype"><option>ไม่มีหลักประกัน</option><option>บุคคลค้ำประกัน</option><option>ทองคำ</option><option>รถยนต์/มอเตอร์ไซค์</option><option>ที่ดิน/โฉนด (จำนอง)</option><option>อื่นๆ</option></select><div class="label">รายละเอียดหลักประกัน</div><input id="coldetail" value="" placeholder="เช่น ทอง 2 บาท / รถ จยย. กข1234 / โฉนดเลขที่..."><div class="label">มูลค่าประเมิน (บาท)</div><input id="colval" type="number" value=""><div class="label">รูปถ่ายหลักประกัน</div><input id="colp" type="file" accept="image/*" capture="environment"><button class="btn" onclick="apply()">ส่งคำขอ</button></div>';
  } else if(tab==='myapps'){const a=await api('/applications/mine');
    body.innerHTML='<h3>คำขอของฉัน</h3>'+(a.length?'<table><tr><th>วันที่</th><th>วงเงิน</th><th>ดอกเบี้ย</th><th>งวด</th><th>สถานะ</th></tr>'+
      a.map(x=>'<tr><td>'+new Date(x.createdAt).toLocaleDateString('th-TH')+'</td><td>'+B(x.amount)+'</td><td>'+x.annualRatePct+'%</td><td>'+x.termMonths+'</td><td>'+tS(x.status)+'</td></tr>').join('')+'</table>':'<div class="card">ยังไม่มีคำขอ</div>');
  } else if(tab==='myloans'){const l=await api('/loans/mine');
    body.innerHTML='<h3>สัญญาของฉัน</h3>'+(l.length?l.map(x=>'<div class="card"><b>'+x.contractNo+'</b> — เงินต้น '+B(x.principal)+' • '+x.annualRatePct+'%/ปี • '+x.termMonths+' งวด • สถานะ '+x.status+
